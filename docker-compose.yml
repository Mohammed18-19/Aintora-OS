services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aintora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-aintora_db}
      POSTGRES_USER:     ${POSTGRES_USER:-aintora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aintora_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aintora}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aintora_backend
    restart: on-failure:3
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aintora}:${POSTGRES_PASSWORD:-aintora_pass}@postgres:5432/${POSTGRES_DB:-aintora_db}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-aintora}:${POSTGRES_PASSWORD:-aintora_pass}@postgres:5432/${POSTGRES_DB:-aintora_db}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        echo '⏳ Waiting for DB...' &&
        sleep 3 &&
        echo '🔄 Running migrations...' &&
        alembic upgrade head &&
        echo '🌱 Seeding database...' &&
        python scripts/seed.py &&
        echo '🚀 Starting server...' &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (React) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aintora_frontend
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  postgres_data:

networks:
  default:
    name: aintora_network
